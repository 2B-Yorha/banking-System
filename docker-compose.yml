
services:
  postgres:
    image: postgres:15
    container_name: banking_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"         # no conflict since you don't have local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: banking_app
    depends_on:
      postgres:
        condition: service_healthy   # waits for Postgres to be ready before starting
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres_data: